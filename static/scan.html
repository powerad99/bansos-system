<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Scan QR - Bansos</title>
<!-- Vercel Speed Insights -->
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0b1220; color:#e7ecf3; }
  header { padding:14px 16px; background:#0f1830; border-bottom:1px solid #1f2a44; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
  header h1 { margin:0; font-size:16px; font-weight:600; letter-spacing:.3px; }
  .badge { font-size:11px; padding:3px 8px; border-radius:999px; background:#1f2a44; color:#9bb0d3; }

  main { padding:14px; max-width:560px; margin:0 auto; }
  .card { background:#111a30; border:1px solid #1f2a44; border-radius:14px; padding:14px; margin-bottom:14px; }

  #reader { width:100%; border-radius:12px; overflow:hidden; background:#000; }
  #reader video { border-radius:12px; }

  .row { display:flex; gap:8px; align-items:center; }
  .grow { flex:1; }
  label { font-size:12px; color:#9bb0d3; display:block; margin-bottom:4px; }
  input, select { width:100%; padding:10px 12px; border-radius:10px; border:1px solid #233252; background:#0c1426; color:#e7ecf3; font-size:14px; }
  input:focus, select:focus { outline:2px solid #3b82f6; outline-offset:0; }

  button { width:100%; padding:14px; border:0; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn-primary { background:#3b82f6; color:white; }
  .btn-primary:disabled { background:#2a3556; color:#7f8db0; cursor:not-allowed; }
  .btn-ghost { background:#1f2a44; color:#e7ecf3; }
  .btn-danger { background:#ef4444; color:white; }

  .ok    { background:#073b1d; border:1px solid #15803d; color:#86efac; }
  .warn  { background:#3a2606; border:1px solid #d97706; color:#fde68a; }
  .err   { background:#3b0a0a; border:1px solid #dc2626; color:#fca5a5; }

  .preview h2 { margin:0 0 6px 0; font-size:18px; }
  .preview .muted { color:#9bb0d3; font-size:12px; }
  .kv { display:grid; grid-template-columns:110px 1fr; gap:6px 10px; margin-top:10px; font-size:14px; }
  .kv .k { color:#9bb0d3; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .chip { background:#1f2a44; color:#cdd9f0; font-size:12px; padding:3px 9px; border-radius:999px; }

  .toast { position:fixed; left:50%; transform:translateX(-50%); bottom:20px; padding:10px 16px; border-radius:10px; font-size:14px; z-index:50; box-shadow:0 6px 24px rgba(0,0,0,.4); }

  .hidden { display:none !important; }

  @media (max-width:380px) {
    header h1 { font-size:14px; }
    .kv { grid-template-columns: 90px 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>📱 Scan QR Penerima</h1>
  <span class="badge" id="status-pill">siap</span>
</header>

<main>
  <div class="card">
    <div id="reader"></div>
    <div class="row" style="margin-top:10px;">
      <button id="btn-start" class="btn-primary grow">Mulai Scan</button>
      <button id="btn-stop" class="btn-ghost grow hidden">Stop</button>
    </div>
    <div style="margin-top:8px;">
      <label>Atau ketik manual payload QR</label>
      <div class="row">
        <input id="manual-input" class="grow" placeholder="v1.123.1798765432.abcd..." />
        <button id="btn-manual" class="btn-ghost" style="width:auto;padding:10px 14px;">Cek</button>
      </div>
    </div>
  </div>

  <div id="result" class="card preview hidden"></div>

  <div id="confirm-card" class="card hidden">
    <h3 style="margin:0 0 8px 0;">Konfirmasi Terima Bantuan</h3>
    <div class="row" style="gap:10px;">
      <div class="grow">
        <label>Jenis bantuan</label>
        <input id="jenis" value="Bantuan Bulanan" />
      </div>
      <div style="width:130px;">
        <label>Nominal (Rp)</label>
        <input id="nominal" type="number" min="0" step="1000" value="0" />
      </div>
    </div>
    <div style="margin-top:10px;">
      <label>Catatan (opsional)</label>
      <input id="keterangan" placeholder="Misal: dititipkan ke ketua RT" />
    </div>
    <div style="margin-top:10px;" class="row">
      <label class="grow" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
        <input type="checkbox" id="use-gps" style="width:auto;" />
        <span>Sertakan lokasi GPS</span>
      </label>
      <span id="gps-info" class="muted" style="font-size:12px;color:#9bb0d3;"></span>
    </div>
    <div style="margin-top:14px;" class="row" >
      <button id="btn-confirm" class="btn-primary grow">✅ Konfirmasi Terima</button>
      <button id="btn-cancel" class="btn-ghost" style="width:auto;padding:14px 16px;">Batal</button>
    </div>
  </div>

  <div class="card" style="font-size:12px; color:#9bb0d3;">
    <b>Login dulu?</b> Halaman ini menggunakan token dari dashboard.
    Buka <a href="/dashboard" style="color:#7eb6ff;">dashboard</a> untuk login terlebih dahulu.
  </div>
</main>

<div id="toast" class="toast hidden"></div>

<script>
const $ = (s) => document.querySelector(s);
const TOKEN = localStorage.getItem("bip_token") || localStorage.getItem("token") || "";
let scanner = null;
let lastPayload = null;
let currentPreview = null;
let lastBeepAt = 0;
let processing = false;  // guard: cegah preview ganda saat sedang proses

function beep(ok=true) {
  if (Date.now() - lastBeepAt < 600) return;
  lastBeepAt = Date.now();
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.frequency.value = ok ? 880 : 220;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
    o.start(); o.stop(ctx.currentTime + 0.2);
  } catch(e){}
  if (navigator.vibrate) navigator.vibrate(ok ? 60 : [80,60,80]);
}

function toast(msg, kind="ok") {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "toast " + kind;
  setTimeout(() => t.classList.add("hidden"), 2500);
}

function setPill(txt, cls="") {
  const p = $("#status-pill");
  p.textContent = txt;
  p.style.background = cls === "ok" ? "#15803d" : cls === "err" ? "#dc2626" : cls === "warn" ? "#d97706" : "#1f2a44";
  p.style.color = cls ? "white" : "#9bb0d3";
}

async function api(path, opts={}) {
  const headers = Object.assign({"Content-Type":"application/json"}, opts.headers || {});
  if (TOKEN) headers.Authorization = "Bearer " + TOKEN;
  const r = await fetch(path, Object.assign({headers}, opts));
  const txt = await r.text();
  let data; try { data = JSON.parse(txt); } catch { data = {detail: txt}; }
  if (!r.ok) throw new Error(data.detail || r.statusText);
  return data;
}

async function startScan() {
  $("#btn-start").classList.add("hidden");
  $("#btn-stop").classList.remove("hidden");
  setPill("scanning…", "warn");
  scanner = new Html5Qrcode("reader");
  try {
    await scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onDecoded,
      () => {}
    );
  } catch (e) {
    await stopScan({ keepStatus: true });
    setPill("kamera gagal", "err");
    toast("Tidak bisa akses kamera: " + e.message, "err");
  }
}

async function stopScan({ keepStatus = false } = {}) {
  $("#btn-stop").classList.add("hidden");
  $("#btn-start").classList.remove("hidden");
  if (!keepStatus) setPill("siap");
  if (scanner) {
    try { await scanner.stop(); await scanner.clear(); } catch(e){}
    scanner = null;
  }
}

async function onDecoded(text) {
  if (processing) return;
  if (text === lastPayload) return;
  processing = true;
  lastPayload = text;
  try {
    await stopScan({ keepStatus: true });
    await doPreview(text);
  } finally {
    processing = false;
  }
}

async function doPreview(qrPayload) {
  setPill("memeriksa…", "warn");
  try {
    const res = await api("/scan/preview", {
      method: "POST",
      body: JSON.stringify({ qr_payload: qrPayload }),
    });
    currentPreview = { payload: qrPayload, data: res };
    renderPreview(res);
  } catch (e) {
    renderError(e.message);
  }
}

function renderError(msg) {
  const r = $("#result");
  r.classList.remove("hidden", "ok", "warn");
  r.classList.add("err");
  beep(false);
  setPill("gagal", "err");
  r.innerHTML = `<h2>❌ QR tidak valid</h2><div class="muted">${escapeHtml(msg)}</div>
    <div style="margin-top:10px;"><button class="btn-ghost" onclick="resetAll()">Scan lagi</button></div>`;
  $("#confirm-card").classList.add("hidden");
}

function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function renderPreview(p) {
  const r = $("#result");
  r.classList.remove("hidden", "ok", "warn", "err");

  if (!p.valid) {
    renderError(p.error || "QR tidak valid");
    return;
  }

  const blocked = p.sudah_terima_bulan_ini || !p.is_active;
  const cls = blocked ? "warn" : "ok";
  r.classList.add(cls);
  beep(!blocked);
  setPill(blocked ? "perhatian" : "valid", cls);

  const warns = (p.warnings || []).map(w => `<div>⚠️ ${escapeHtml(w)}</div>`).join("");
  const chips = (p.kategori || []).map(k => `<span class="chip">${escapeHtml(k)}</span>`).join("");

  r.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <h2>${blocked ? "⚠️" : "🟢"} ${escapeHtml(p.nama || "-")}</h2>
      <span class="muted">#${p.penerima_id}</span>
    </div>
    <div class="muted">NIK: ${escapeHtml(p.nik || "-")}${p.kode_seri ? " · " + escapeHtml(p.kode_seri) : ""}</div>
    ${chips ? `<div class="chips">${chips}</div>` : ""}
    <div class="kv">
      <div class="k">Alamat</div><div>${escapeHtml(p.alamat || "-")}</div>
      <div class="k">No. Telp</div><div>${escapeHtml(p.no_telp || "-")}</div>
      <div class="k">Status</div><div>${escapeHtml(p.status_bantuan || "-")}</div>
      ${p.is_bulanan ? `<div class="k">Bulan ini</div><div>${p.bulan_ini}/${p.tahun_ini} — ${p.sudah_terima_bulan_ini ? "✅ sudah" : "⏳ belum"} diterima</div>` : ""}
    </div>
    ${warns ? `<div style="margin-top:10px;">${warns}</div>` : ""}
    <div style="margin-top:14px;display:flex;gap:8px;">
      <button class="btn-ghost grow" onclick="resetAll()">Scan lagi</button>
    </div>
  `;

  if (blocked && p.sudah_terima_bulan_ini) {
    $("#confirm-card").classList.add("hidden");
  } else {
    $("#confirm-card").classList.remove("hidden");
  }
}

async function getGPS() {
  if (!navigator.geolocation) throw new Error("Geolocation tidak didukung");
  return await new Promise((res, rej) => {
    navigator.geolocation.getCurrentPosition(
      pos => res({lat: pos.coords.latitude, lng: pos.coords.longitude}),
      err => rej(new Error(err.message)),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
}

async function doConfirm() {
  if (!currentPreview) return;
  const btn = $("#btn-confirm");
  btn.disabled = true; btn.textContent = "Mengirim…";

  let body = {
    qr_payload: currentPreview.payload,
    jenis_bantuan: $("#jenis").value || "Bantuan",
    nominal: Number($("#nominal").value || 0),
    keterangan: $("#keterangan").value || null,
  };

  if ($("#use-gps").checked) {
    try {
      const gps = await getGPS();
      body.lokasi_lat = gps.lat; body.lokasi_lng = gps.lng;
      $("#gps-info").textContent = `${gps.lat.toFixed(5)}, ${gps.lng.toFixed(5)}`;
    } catch (e) {
      toast("GPS gagal: " + e.message, "warn");
    }
  }

  try {
    const res = await api("/scan/confirm", { method: "POST", body: JSON.stringify(body) });
    beep(true);
    setPill("terkirim", "ok");
    toast("✅ Distribusi tercatat: " + res.no_seri, "ok");
    setTimeout(resetAll, 1200);
  } catch (e) {
    beep(false);
    setPill("ditolak", "err");
    toast("❌ " + e.message, "err");
  } finally {
    btn.disabled = false; btn.textContent = "✅ Konfirmasi Terima";
  }
}

function resetAll() {
  lastPayload = null;
  currentPreview = null;
  processing = false;
  $("#result").classList.add("hidden");
  $("#confirm-card").classList.add("hidden");
  $("#manual-input").value = "";
  $("#gps-info").textContent = "";
  setPill("siap");
  startScan();
}

$("#btn-start").onclick = startScan;
$("#btn-stop").onclick = () => stopScan();
$("#btn-manual").onclick = async () => {
  const v = $("#manual-input").value.trim();
  if (!v) return;
  await stopScan({ keepStatus: true });
  await doPreview(v);
};
$("#btn-confirm").onclick = doConfirm;
$("#btn-cancel").onclick = resetAll;

if (!TOKEN) {
  toast("Belum login - hasil scan akan ditolak", "warn");
}
</script>
</body>
</html>
